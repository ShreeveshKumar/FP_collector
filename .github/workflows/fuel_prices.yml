name: Fuel Price Collector CI/CD

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours (UTC)
  workflow_dispatch:

jobs:
  run-job:
    runs-on: ubuntu-latest
    environment: research
    env:
      SRC_A_PRIMARY_URL: ${{ secrets.SRC_A_PRIMARY_URL }}
      SRC_A_DETAIL_URL: ${{ secrets.SRC_A_DETAIL_URL }}
      SRC_B_API_KEY: ${{ secrets.SRC_B_API_KEY }}
      SRC_B_BASE_URL: ${{ secrets.SRC_B_BASE_URL }}
      SRC_B_SERIES_1_URL: ${{ secrets.SRC_B_SERIES_1_URL }}
      SRC_B_SERIES_2_URL: ${{ secrets.SRC_B_SERIES_2_URL }}
      HTTP_USER_AGENT: ${{ secrets.HTTP_USER_AGENT }}
      HTTP_ACCEPT: ${{ secrets.HTTP_ACCEPT }}
      HTTP_ACCEPT_LANGUAGE: ${{ secrets.HTTP_ACCEPT_LANGUAGE }}
      HTTP_REQUEST_ID: ${{ secrets.HTTP_REQUEST_ID }}
      HTTP_TRACE_ID: ${{ secrets.HTTP_TRACE_ID }}
      HTTP_SESSION_TOKEN: ${{ secrets.HTTP_SESSION_TOKEN }}
      HTTP_CLIENT_ID: ${{ secrets.HTTP_CLIENT_ID }}
      HTTP_NONCE: ${{ secrets.HTTP_NONCE }}
      MONGO_HOST: ${{ secrets.MONGO_HOST }}
      MONGO_USERNAME: ${{ secrets.MONGO_USERNAME }}
      MONGO_PASSWORD: ${{ secrets.MONGO_PASSWORD }}
      MONGO_DB: ${{ secrets.MONGO_DB }}
      MONGO_PRICES_COLLECTION: ${{ secrets.MONGO_PRICES_COLLECTION }}
      MONGO_META_COLLECTION: ${{ secrets.MONGO_META_COLLECTION }}
      MONGO_URI: ${{ secrets.MONGO_URI }} # optional — overrides the components above

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run fuel price scraper
        run: |
          python scraper/fetch_fuel_prices.py